<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Modbus IDS</title><style>body{font-family:monospace;background:#1e1e2e;color:#cdd6f4;padding:20px;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #45475a;padding:8px;}th{background:#313244;}.anomaly{background:#f38ba8;color:#1e1e2e;}</style><script>setInterval(function(){fetch('status.json').then(r=>r.json()).then(d=>{document.getElementById('src_ip').innerText=d.src_ip;document.getElementById('func').innerText=d.func_code;document.getElementById('status').innerText=d.is_anomaly?'ANOMALY':'Normal';document.getElementById('score').innerText=d.confidence;document.getElementById('reason').innerText=d.reason;document.getElementById('interval').innerText=d.interval_ms;document.getElementById('rw').innerText=d.read_write_ratio;document.getElementById('change').innerText=d.value_change;let row=document.getElementById('row');row.className=d.is_anomaly?'anomaly':'';}).catch(e=>{});},500);</script></head><body><h2>Modbus IDS Dashboard</h2><table><tr><th>Source IP</th><th>Func</th><th>Status</th><th>Score</th><th>Reason</th></tr><tr id='row'><td id='src_ip'>-</td><td id='func'>-</td><td id='status'>-</td><td id='score'>-</td><td id='reason'>-</td></tr><tr><th>Interval(ms)</th><th>R/W Ratio</th><th>Value Change</th></tr><tr><td id='interval'>-</td><td id='rw'>-</td><td id='change'>-</td></tr></table></body></html>
